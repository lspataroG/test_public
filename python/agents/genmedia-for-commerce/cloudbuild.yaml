# Cloud Build pipeline for Cloud Run deployment.
#
# Downloads the catalogue (~747MB, gitignored) from GCS during build
# so it's baked into the Docker image (no runtime download needed).
#
# Usage (via Makefile):
#   make deploy-cloudrun
#
# Manual usage:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=COMMIT_SHA=$(git rev-parse --short HEAD) .

steps:
  # 1. Download catalogue from GCS (gitignored, not in source upload)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'download-catalogue'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil cp gs://${_ASSET_BUCKET}/${_ASSET_PREFIX}/backend_assets.tar.gz /tmp/ba.tar.gz
        tar xzf /tmp/ba.tar.gz -C assets/ backend_assets/catalogue/
        echo "Catalogue extracted: $$(du -sh assets/backend_assets/catalogue/)"

  # 2. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest'
      - '--build-arg'
      - 'COMMIT_SHA=$COMMIT_SHA'
      - '--build-arg'
      - 'AGENT_VERSION=${_AGENT_VERSION}'
      - '.'
    timeout: '1800s'
    waitFor: ['download-catalogue']

  # 3. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}'
    waitFor: ['build-image']

  # 4. Deploy to Cloud Run
  # Always requires IAM auth. Set _USE_IAP=true to also enable Identity-Aware Proxy.
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy ${_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --memory=${_MEMORY} \
          --cpu=${_CPU} \
          --timeout=${_TIMEOUT} \
          --concurrency=${_CONCURRENCY} \
          --min-instances=${_MIN_INSTANCES} \
          --max-instances=${_MAX_INSTANCES} \
          --service-account=${_SERVICE_ACCOUNT} \
          --no-allow-unauthenticated \
          --no-cpu-throttling \
          --labels=created-by=adk \
          --set-env-vars=PROJECT_ID=$PROJECT_ID,DEFAULT_REGION=${_REGION} \
          $([ "${_USE_IAP}" = "true" ] && echo "--iap" || true)
    waitFor: ['push-image']

substitutions:
  _SERVICE: genmedia-for-commerce
  _REGION: us-central1
  _REPO: genmedia-for-commerce-repo
  _MEMORY: '32Gi'
  _CPU: '8'
  _TIMEOUT: '3600'
  _CONCURRENCY: '7'
  _MIN_INSTANCES: '2'
  _MAX_INSTANCES: '10'
  _USE_IAP: ''
  _AGENT_VERSION: '0.0.0'
  _ASSET_BUCKET: '19a40926f22f11a86e124e9bc9d75c0f736ce20184e1793506ea8ca0a0cfdfe'
  _ASSET_PREFIX: 'genmedia_for_commerce_repo_assets'
  _SERVICE_ACCOUNT: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest'

timeout: 2400s
